# Model configuration (reference: agentic_rag_contracts)
# Env overrides: OPENROUTER_API_KEY, OPENROUTER_BASE_URL, OPENROUTER_MODEL
# Lower max_tokens = faster responses. Use a faster model (e.g. gpt-4o-mini) for speed.
llms:
  primary:
    provider: openrouter
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-4o-mini"
    temperature: 0.4
    max_tokens: 512
